name: Analyze PR and Notify Docs

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to analyze (leave blank for canned test input)"
        required: false
        type: string
  pull_request:
    types: [closed]

permissions:
  contents: read
  pull-requests: read

jobs:
  docs_check:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build PR context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e

          IS_TEST_RUN="false"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
            TITLE="${{ github.event.pull_request.title }}"
            BODY="${{ github.event.pull_request.body }}"
            PR_URL="${{ github.event.pull_request.html_url }}"
          else
            PR_NUMBER="${{ github.event.inputs.pr_number }}"
            if [ -n "$PR_NUMBER" ]; then
              TITLE=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json title --jq .title)
              BODY=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json body --jq .body)
              PR_URL=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json url --jq .url)
            else
              IS_TEST_RUN="true"
              PR_NUMBER="TEST"
              TITLE="Test Feature (manual workflow dispatch — no real PR)"
              BODY="Added a new settings page for users to manage preferences."
              PR_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            fi
          fi

          {
            echo "PR_NUMBER=$PR_NUMBER"
            echo "PR_URL=$PR_URL"
            echo "IS_TEST_RUN=$IS_TEST_RUN"
            echo "PR_TITLE<<__EOF__"
            echo "$TITLE"
            echo "__EOF__"
          } >> "$GITHUB_ENV"

          echo "Title: $TITLE" > pr_context.txt
          echo "Body: $BODY" >> pr_context.txt
          echo "" >> pr_context.txt
          echo "===== DIFF =====" >> pr_context.txt

          if [ "$IS_TEST_RUN" = "true" ]; then
            echo "(test run — no diff; decision will be forced to YES)" >> pr_context.txt
          elif [ -n "$PR_NUMBER" ]; then
            echo "Fetching diff for PR #$PR_NUMBER in $REPO ..."
            if gh pr diff "$PR_NUMBER" --repo "$REPO" > /tmp/diff.txt 2> /tmp/diff.err; then
              DIFF_BYTES=$(wc -c < /tmp/diff.txt)
              echo "gh pr diff succeeded, $DIFF_BYTES bytes"
              if [ "$DIFF_BYTES" -eq 0 ]; then
                echo "(diff was empty)" >> pr_context.txt
              else
                head -c 60000 /tmp/diff.txt >> pr_context.txt
                if [ "$DIFF_BYTES" -gt 60000 ]; then
                  echo "" >> pr_context.txt
                  echo "... [diff truncated at 60000 bytes; original was $DIFF_BYTES bytes]" >> pr_context.txt
                fi
              fi
            else
              echo "gh pr diff FAILED:"
              cat /tmp/diff.err
              echo "(could not fetch diff: $(cat /tmp/diff.err))" >> pr_context.txt
            fi
          else
            echo "(no PR number)" >> pr_context.txt
          fi

          echo ""
          echo "===== PR CONTEXT (first 200 lines) ====="
          head -n 200 pr_context.txt
          echo ""
          echo "===== PR CONTEXT SIZE ====="
          wc -c pr_context.txt

      - name: Call OpenAI API
        id: openai
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5.5
        run: |
          SYSTEM_PROMPT=$(cat <<'EOF'
          You are a documentation analyst for a user-facing GUI application. You review code changes from merged pull requests and decide whether user-facing documentation needs to be created or updated.

          THE DIFF IS YOUR PRIMARY EVIDENCE. The PR title and body describe what the author intended or claimed; the diff shows what actually changed. When they disagree, trust the diff. A PR titled "Add settings page" that only renames a variable is a rename, not a new feature — respond NO. A PR with a vague title that actually adds a new user-visible screen needs docs — respond YES. Never decide based on the title or body alone when a diff is present.

          If the diff is missing, empty, or shows a "(no diff supplied)" / "(could not fetch diff)" marker, respond NO and state in your explanation that you could not see the actual code changes and are declining to infer from the title or body.

          Documentation updates ARE needed when the diff shows:
          - A brand-new user-facing feature, page, screen, or application, even if it ships complete in a single pull request and no documentation exists for it yet.
          - Added, removed, or changed screens, dashboards, buttons, menus, fields, or settings a user interacts with
          - Changes to default behavior or the steps a user follows to do something
          - Added, removed, or renamed features or user-facing configuration options
          - Changes to wording shown to the user, such as error messages, labels, tooltips, or button text

          Documentation updates are NOT needed when the diff shows only:
          - Renames of variables, functions, classes, files, or other identifiers with no behavior change
          - Internal code changes with no visible effect (refactors, performance work, dependency bumps, type annotations)
          - Changes to tests, CI config, build scripts, comments, formatting, or logging
          - Bug fixes that restore intended behavior without changing how a user interacts with the feature

          Respond in exactly this format:
          Line 1: "DOCS_NEEDED: YES" or "DOCS_NEEDED: NO"
          Line 2 onward: a 1-3 sentence explanation that references what the diff actually shows.
          EOF
          )

          USER_CONTENT=$(cat pr_context.txt)

          REQUEST_JSON=$(jq -n \
            --arg model "$OPENAI_MODEL" \
            --arg system "$SYSTEM_PROMPT" \
            --arg user "$USER_CONTENT" \
            '{
              model: $model,
              reasoning: { effort: "low" },
              input: [
                {
                  role: "system",
                  content: [{ type: "input_text", text: $system }]
                },
                {
                  role: "user",
                  content: [{ type: "input_text", text: $user }]
                }
              ],
              max_output_tokens: 800
            }')

          echo "===== REQUEST JSON ====="
          echo "$REQUEST_JSON" | jq .

          RESPONSE=$(curl https://api.openai.com/v1/responses \
            -sS \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$REQUEST_JSON")

          echo "===== RAW RESPONSE ====="
          echo "$RESPONSE" | jq .

          CONTENT=$(echo "$RESPONSE" | jq -r '[.output[]?.content[]? | select(.type == "output_text") | .text] | join("\n")')

          echo "===== OPENAI OUTPUT ====="
          echo "$CONTENT"

          if [ -z "$CONTENT" ]; then
            echo "ERROR: OpenAI returned empty response"
            STATUS=$(echo "$RESPONSE" | jq -r '.status // empty')
            INCOMPLETE_REASON=$(echo "$RESPONSE" | jq -r '.incomplete_details.reason // empty')
            [ -n "$STATUS" ] && echo "status: $STATUS"
            [ -n "$INCOMPLETE_REASON" ] && echo "incomplete reason: $INCOMPLETE_REASON"
            exit 1
          fi

          DECISION=$(echo "$CONTENT" | head -n 1 | sed -E 's/.*DOCS_NEEDED:[[:space:]]*//' | tr -d '[:space:]')
          EXPLANATION=$(echo "$CONTENT" | tail -n +2 | sed '/./,$!d')

          if [ "$IS_TEST_RUN" = "true" ]; then
            echo "Test run — overriding decision to YES"
            DECISION="YES"
            EXPLANATION="This is a [TEST] dispatch from a manual workflow_dispatch with no PR number. Safe to ignore. (Model's actual response is in the workflow run summary.)"
          fi

          echo "Parsed decision: $DECISION"

          {
            echo "decision=$DECISION"
            echo "explanation<<__EOF__"
            echo "$EXPLANATION"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

          echo "## OpenAI Docs Decision" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$IS_TEST_RUN" = "true" ]; then
            echo "_Test run — decision forced to YES._" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$CONTENT" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Dispatch to fake-docs
        env:
          DOCS_DISPATCH_TOKEN: ${{ secrets.DOCS_DISPATCH_TOKEN }}
        run: |
          PAYLOAD=$(jq -n \
            --arg decision "${{ steps.openai.outputs.decision }}" \
            --arg explanation "${{ steps.openai.outputs.explanation }}" \
            --arg pr_number "${{ env.PR_NUMBER }}" \
            --arg pr_url "${{ env.PR_URL }}" \
            --arg pr_title "${{ env.PR_TITLE }}" \
            '{
              event_type: "app-pr-analyzed",
              client_payload: {
                decision: $decision,
                explanation: $explanation,
                pr_number: $pr_number,
                pr_url: $pr_url,
                pr_title: $pr_title
              }
            }')

          echo "===== DISPATCH PAYLOAD ====="
          echo "$PAYLOAD" | jq .

          curl -i -X POST \
            -H "Authorization: Bearer $DOCS_DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/Be-WTurner/fake-docs/dispatches \
            -d "$PAYLOAD"
