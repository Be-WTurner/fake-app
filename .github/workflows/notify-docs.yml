name: Notify Docs on PR Merge

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  dispatch:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Send dispatch to fake-docs
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.DOCS_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/Be-WTurner/fake-docs/dispatches \
            -d '{"event_type":"app-pr-merged","client_payload":{"message":"Hello World Transmission Worked"}}'